<!DOCTYPE html>
<html lang="en">

  <title>Farewell Invite</title>

<body>

<div class="container">

  <!-- Page 1 -->

    <button onclick="nextPage()">Start 💫</button>

  <!-- Page 2 -->
  <section class="page" id="page2">

    <p>Click below to view your invite</p>
    <button onclick="nextPage()">Open 💌</button>
  </section>

  <!-- Page 3 -->
  <section class="page" id="page3">
    <img src="card.jpg" class="card">
    <button onclick="nextPage()">Next ➡️</button>
  </section>

  <!-- Page 4 (NOW PAGE 4 REMOVED) -->
  
  <!-- Page 4 becomes NEW Page 4 = THANK YOU -->
  <section class="page" id="page4">
    <h1>🙏 Thank You</h1>
    <p>The journey ends, but memories stay forever…<br>
Join us for a night full of laughter, fun & unforgettable moments at our Farewell Party 🎓✨</p>
    <p>Let’s make this day memorable 💖</p>
  </section>

</div>

<script src="script.js"></script>
